<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <header>
        <h1 class="logo">AFTERFALL</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#features">Features</a>
        </nav>
    </header>

    <!-- HERO -->
    <section id="home" class="hero">
        <h2>Welcome to Afterfall</h2>
        <p>Survive. Adapt. Dominate.</p>
        <button onclick="copyIP()">Copy Server IP</button>
    </section>

    <!-- ABOUT -->
    <section id="about">
        <h2>About</h2>
        <p>
            Afterfall adalah server survival dengan sistem RP, zombie, dan mekanik unik.
        </p>
    </section>

    <!-- FEATURES -->
    <section id="features">
        <h2>Features</h2>
        <div class="cards">
            <div class="card">🧟 Zombie System</div>
            <div class="card">🎭 Roleplay Mode</div>
            <div class="card">⚔️ Custom Combat</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer>
        <p>© 2026 Afterfall Server</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
